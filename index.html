<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - App Restaurante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #8B0000, #FF6B00);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            border: none;
        }

        .logo {
            font-size: 50px;
        }

        .btn-login {
            background-color: #8B0000;
            border: none;
        }

        .btn-login:hover {
            background-color: #6d0000;
        }
    </style>
</head>
<body>

    <div class="card login-card shadow-lg">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <h3 class="fw-bold mt-2">App Restaurante</h3>
                <p class="text-muted">Inicio de sesión</p>
            </div>

            <form onsubmit="validarLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="usuario" class="form-control" placeholder="Ingrese su usuario" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
                </div>

                <div id="mensaje" class="text-danger mb-3"></div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-login text-white">
                        Ingresar
                    </button>
                </div>

                <div class="d-grid mt-3">
                    <button type="button" class="btn btn-secondary px-4">
                        Registrar
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script>
        function validarLogin(event) {
            event.preventDefault();

            let usuario = document.getElementById("usuario").value;
            let password = document.getElementById("password").value;

            if (usuario === "admin" && password === "123") {
                window.location.href = "usuarios.php";
            } else {
                document.getElementById("mensaje").innerHTML = "Usuario o contraseña incorrectos";
            }
        }
    </script>

</body>
</html>
